<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | D'Vaaw Fragrances</title>
    <style>
        /* Base Styles & Typography */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #fff; color: #111; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }

        /* Navigation */
        nav { background-color: #000; color: #fff; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; width: 100%; z-index: 10; }
        .nav-links, .nav-icons { display: flex; gap: 25px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links a:hover, .nav-icons a:hover { color: #d4af37; }
        .logo { font-size: 1.5rem; font-weight: 600; letter-spacing: 4px; text-align: center; text-transform: uppercase; color: #fff; }

        /* Page Header */
        .page-header { background-color: #f9f9f9; padding: 50px 5%; text-align: center; border-bottom: 1px solid #eee; }
        .page-header h1 { font-size: 2.5rem; font-weight: 300; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; }
        .checkout-steps { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
        .step.active { color: #111; font-weight: 600; border-bottom: 2px solid #d4af37; padding-bottom: 5px; }

        /* Checkout Layout */
        .checkout-container { display: flex; padding: 60px 10%; gap: 50px; flex: 1; }
        
        /* Shipping Form Section */
        .shipping-section { flex: 2; }
        .shipping-section h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 25px; }
        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }
        
        label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px 15px; border: 1px solid #ddd; background-color: #fcfcfc; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; color: #111; outline: none; transition: border-color 0.3s ease; }
        input:focus, select:focus { border-color: #111; }

        /* Order Summary Section */
        .summary-section { flex: 1.2; background-color: #fcfcfc; border: 1px solid #eee; padding: 40px; height: fit-content; position: sticky; top: 20px; }
        .summary-section h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        
        .summary-items { margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 10px; max-height: 300px; overflow-y: auto; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9rem; }
        .item-name { color: #111; font-weight: 500; display: flex; flex-direction: column; }
        .item-meta { font-size: 0.75rem; color: #888; font-weight: 400; margin-top: 4px; }
        
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9rem; color: #555; }
        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 1.2rem; font-weight: 600; color: #111; text-transform: uppercase; }
        
        .checkout-btn { display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; background-color: #25D366; /* WhatsApp Green */ color: #fff; text-align: center; padding: 18px 0; margin-top: 30px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; font-weight: 600; border: none; cursor: pointer; transition: background 0.3s ease; }
        .checkout-btn:hover { background-color: #128C7E; }
        .checkout-btn img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        /* Footer */
        footer { background-color: #000; color: #fff; padding: 60px 10% 20px; margin-top: auto; }
        .footer-columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-bottom: 60px; }
        .footer-col h4 { text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 20px; color: #d4af37; }
        .footer-col ul { list-style: none; }
        .footer-col ul li { margin-bottom: 12px; }
        .footer-col ul li a { font-size: 0.8rem; color: #aaa; transition: color 0.3s ease; }
        .footer-col ul li a:hover { color: #fff; }
        .footer-bottom { text-align: center; border-top: 1px solid #222; padding-top: 20px; font-size: 0.7rem; color: #666; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="category-her.html">For Her</a>
            <a href="category-him.html">For Him</a>
            <a href="category-unisex.html">Unisex</a>
            <a href="category-borneo.html">Borneo Edition</a>
        </div>
        <div class="logo">
            <a href="index.html">D'VAAW</a>
        </div>
        <div class="nav-icons">
            <a href="about.html">About Us</a>
            <a href="cart.html">Cart</a>
        </div>
    </nav>

    <header class="page-header">
        <h1>Checkout</h1>
        <div class="checkout-steps">
            <span class="step">1. Cart</span> &mdash;
            <span class="step active">2. Checkout</span> &mdash;
            <span class="step">3. Complete</span>
        </div>
    </header>

    <section class="checkout-container">
        
        <!-- Shipping Details Form -->
        <div class="shipping-section">
            <h2>Shipping Details</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="phone">WhatsApp Number</label>
                    <input type="tel" id="phone" required placeholder="e.g. 0123456789">
                </div>

                <div class="form-group">
                    <label for="address">Full Address</label>
                    <input type="text" id="address" required placeholder="House number, street name, building">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="postcode">Postcode</label>
                        <input type="text" id="postcode" required placeholder="e.g. 94300">
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" required placeholder="e.g. Kota Samarahan">
                    </div>
                </div>

                <div class="form-group">
                    <label for="state">State</label>
                    <select id="state" required>
                        <option value="Sarawak" selected>Sarawak</option>
                        <option value="Sabah">Sabah</option>
                        <option value="Johor">Johor</option>
                        <option value="Kedah">Kedah</option>
                        <option value="Kelantan">Kelantan</option>
                        <option value="Melaka">Melaka</option>
                        <option value="Negeri Sembilan">Negeri Sembilan</option>
                        <option value="Pahang">Pahang</option>
                        <option value="Penang">Penang</option>
                        <option value="Perak">Perak</option>
                        <option value="Perlis">Perlis</option>
                        <option value="Selangor">Selangor</option>
                        <option value="Terengganu">Terengganu</option>
                        <option value="Kuala Lumpur">Kuala Lumpur</option>
                        <option value="Putrajaya">Putrajaya</option>
                        <option value="Labuan">Labuan</option>
                    </select>
                </div>
            </form>
        </div>

        <!-- Order Summary -->
        <div class="summary-section">
            <h2>Order Summary</h2>
            
            <div class="summary-items" id="summary-items-container">
                <!-- JavaScript will inject items here -->
            </div>
            
            <div class="summary-row">
                <span>Subtotal</span>
                <span>RM<span id="summary-subtotal">0.00</span></span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>RM<span id="summary-shipping">0.00</span></span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span>RM<span id="summary-total">0.00</span></span>
            </div>

            <!-- WhatsApp Checkout Button -->
            <button class="checkout-btn" onclick="processWhatsAppOrder()">
                <!-- Simple SVG WhatsApp Icon -->
                <svg xmlns="http://www.开展w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                Place Order via WhatsApp
            </button>
        </div>

    </section>

    <footer>
        <div class="footer-columns">
            <div class="footer-col">
                <h4>Shop Categories</h4>
                <ul><li><a href="shop-all.html">All Products</a></li></ul>
            </div>
            <div class="footer-col">
                <h4>Information</h4>
                <ul><li><a href="about.html">Our Story</a></li></ul>
            </div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 D'Vaaw Perfume.</p></div>
    </footer>

    <!-- JAVASCRIPT FOR CHECKOUT & WHATSAPP FORMATTING -->
    <script>
        // --- IMPORTANT: REPLACE WITH YOUR ACTUAL WHATSAPP NUMBER ---
        // Format: Country code (60 for Malaysia) followed by number. NO plus sign, NO spaces.
        const WHATSAPP_NUMBER = "601118866239"; 

        document.addEventListener('DOMContentLoaded', loadCheckoutSummary);

        function loadCheckoutSummary() {
            const container = document.getElementById('summary-items-container');
            let cart = JSON.parse(localStorage.getItem('dvaaw_cart')) || [];
            
            // Redirect to cart if empty
            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            let subtotal = 0;
            container.innerHTML = '';

            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                
                container.innerHTML += `
                    <div class="summary-item">
                        <div class="item-name">
                            ${item.qty}x ${item.title}
                            <span class="item-meta">${item.variant}</span>
                        </div>
                        <div>RM${itemTotal.toFixed(2)}</div>
                    </div>
                `;
            });

            const shipping = 10.00;
            const finalTotal = subtotal + shipping;

            document.getElementById('summary-subtotal').textContent = subtotal.toFixed(2);
            document.getElementById('summary-shipping').textContent = shipping.toFixed(2);
            document.getElementById('summary-total').textContent = finalTotal.toFixed(2);
        }

        function processWhatsAppOrder() {
            const form = document.getElementById('checkout-form');
            
            // Check if form is filled out
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Get Form Data
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const postcode = document.getElementById('postcode').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;

            // Get Cart Data
            let cart = JSON.parse(localStorage.getItem('dvaaw_cart')) || [];
            let subtotal = document.getElementById('summary-subtotal').textContent;
            let shipping = document.getElementById('summary-shipping').textContent;
            let total = document.getElementById('summary-total').textContent;

            // Build the WhatsApp Message String
            let message = `*NEW ORDER - D'VAAW PERFUME* 🌟\n\n`;
            
            message += `*CUSTOMER DETAILS*\n`;
            message += `Name: ${name}\n`;
            message += `Phone: ${phone}\n`;
            message += `Address: ${address}, ${postcode} ${city}, ${state}\n\n`;
            
            message += `*ORDER ITEMS*\n`;
            cart.forEach(item => {
                const itemTotal = (item.price * item.qty).toFixed(2);
                message += `▪️ ${item.qty}x ${item.title} (${item.variant}) - RM${itemTotal}\n`;
            });

            message += `\n*PAYMENT SUMMARY*\n`;
            message += `Subtotal: RM${subtotal}\n`;
            message += `Shipping: RM${shipping}\n`;
            message += `*Total to Pay: RM${total}*\n\n`;
            
            message += `Please provide me with your bank details/QR Pay to complete this order. Thank you!`;

            // Encode message for URL and redirect
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`;
            
            // Open WhatsApp in new tab
            window.open(whatsappUrl, '_blank');

            // Optional: Clear cart after successful order initialization
            // localStorage.removeItem('dvaaw_cart');
            // window.location.href = 'index.html';
        }
    </script>
</body>
</html>
